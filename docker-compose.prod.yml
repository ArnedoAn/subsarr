services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/arnedoan/subsarr-backend:latest
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      REDIS_URL: redis://redis:6379
      SUBSYNC_MEDIA_DIRS: ${SUBSYNC_MEDIA_DIRS:-/media}
      SUBSYNC_SCAN_CACHE_TTL_MINUTES: ${SUBSYNC_SCAN_CACHE_TTL_MINUTES:-30}
      SUBSYNC_SOURCE_LANGUAGE: ${SUBSYNC_SOURCE_LANGUAGE:-eng}
      SUBSYNC_TARGET_LANGUAGE: ${SUBSYNC_TARGET_LANGUAGE:-spa}
      SUBSYNC_CONCURRENCY: ${SUBSYNC_CONCURRENCY:-2}
      SUBSYNC_SETTINGS_FILE_PATH: /data/subsync.settings.json
      # Misma carpeta que el volumen :/data (DB SQLite, profiles.json, glossary.json, history/)
      SUBSYNC_DATA_DIR: /data
      # Opcional: SUBSYNC_DATABASE_PATH=/data/subsarr.db
      SUBSYNC_PATH_EXCLUSIONS: ${SUBSYNC_PATH_EXCLUSIONS:-}
      SUBSYNC_FILE_TOO_LARGE_BYTES: ${SUBSYNC_FILE_TOO_LARGE_BYTES:-}
      PORT: 3001
    volumes:
      - ${SUBSYNC_MEDIA_VOLUME}:/media
      - ${SUBSYNC_DATA_VOLUME:-./data}:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/settings"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: ghcr.io/arnedoan/subsarr-frontend:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      API_INTERNAL_URL: http://api:3001
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',r=>{r.resume();process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
